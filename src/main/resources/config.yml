# ==========================================
# SimpleGens - Core Configuration
# ==========================================
# General settings for the SimpleGens plugin.
# Individual generators are stored in generators.yml.

# Default prefix for plugin messages
prefix: "<gray>[<gold>SimpleGens</gold>]</gray> "

# If true, players in Static Mode generators cannot break blocks when their inventory is completely full.
# This prevents drops from going to the ground and being lost.
prevent-break-when-full: true
